name: Build Windows EXE

# Builds a standalone Windows .exe on a real Windows runner (PyInstaller cannot
# cross-compile, so this must run on windows-*). The .exe is uploaded as a
# downloadable artifact, and attached to a GitHub Release when you push a tag.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name BulkMediaDownloader `
            --collect-all yt_dlp `
            --collect-all gallery_dl `
            --collect-submodules PySide6 `
            app.py

      - name: Smoke-test the EXE
        run: |
          .\dist\BulkMediaDownloader.exe --version

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: BulkMediaDownloader-windows
          path: dist/BulkMediaDownloader.exe
          if-no-files-found: error

      - name: Attach EXE to Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BulkMediaDownloader.exe
