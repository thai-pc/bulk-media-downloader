name: Build Windows EXE

# Builds a standalone Windows .exe on a real Windows runner (PyInstaller cannot
# cross-compile, so this must run on windows-*). The .exe is uploaded as a
# downloadable artifact, and attached to a GitHub Release when you push a tag.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Download ffmpeg (to bundle into the exe)
        shell: pwsh
        run: |
          # Only ffmpeg.exe is bundled — yt-dlp needs it for merging/extraction.
          # ffprobe is optional and ~90MB, so we deliberately skip it.
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $ff = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $ff.FullName -Destination ffmpeg.exe
          Get-Item ffmpeg.exe | Select-Object Name, Length

      - name: Build EXE with PyInstaller
        # No --collect-submodules PySide6 (that bundles the whole Qt stack,
        # incl. WebEngine, ~200MB+). PyInstaller's PySide6 hook bundles the
        # imported modules + platform plugins; we exclude heavy unused Qt modules
        # to keep the .exe small.
        run: |
          pyinstaller --noconfirm --onefile --windowed --name BulkMediaDownloader `
            --icon assets/icon.ico `
            --add-binary "ffmpeg.exe;." `
            --collect-all yt_dlp `
            --collect-all gallery_dl `
            --exclude-module PySide6.QtWebEngineCore `
            --exclude-module PySide6.QtWebEngineWidgets `
            --exclude-module PySide6.QtWebEngineQuick `
            --exclude-module PySide6.QtQuick `
            --exclude-module PySide6.QtQuick3D `
            --exclude-module PySide6.QtQml `
            --exclude-module PySide6.QtQuickWidgets `
            --exclude-module PySide6.Qt3DCore `
            --exclude-module PySide6.Qt3DRender `
            --exclude-module PySide6.QtCharts `
            --exclude-module PySide6.QtDataVisualization `
            --exclude-module PySide6.QtMultimedia `
            --exclude-module PySide6.QtMultimediaWidgets `
            --exclude-module PySide6.QtPdf `
            --exclude-module PySide6.QtPdfWidgets `
            --exclude-module PySide6.QtDesigner `
            --exclude-module PySide6.QtHelp `
            --exclude-module PySide6.QtSql `
            --exclude-module PySide6.QtTest `
            --exclude-module PySide6.QtOpenGL `
            --exclude-module PySide6.QtOpenGLWidgets `
            --exclude-module tkinter `
            app.py

      - name: Smoke-test the EXE
        run: |
          .\dist\BulkMediaDownloader.exe --version
          "Built exe size:"
          (Get-Item .\dist\BulkMediaDownloader.exe).Length / 1MB

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: BulkMediaDownloader-windows
          path: dist/BulkMediaDownloader.exe
          if-no-files-found: error

      - name: Attach EXE to Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BulkMediaDownloader.exe
